<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>War Inc Rising - Application Guide</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../assets/css/style.css">
    <!-- 🚀 載入數據檔案 -->
    <script src="guild_data.js"></script>
    <style>
        .lang-switcher { position: fixed; top: 20px; right: 20px; z-index: 2000; }
        .lang-select { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px); border: 2px solid #004e92; color: #004e92; padding: 8px 15px; border-radius: 50px; font-weight: 800; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .breadcrumb { font-weight: 600; color: #004e92; margin-bottom: 2rem; font-size: 1.1rem; }
        .breadcrumb a { text-decoration: none; color: #444; }

        /* 步驟圖片樣式 */
        .guide-image { border-radius: 1rem; border: 3px solid rgba(255, 255, 255, 0.6); box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1); height: auto; margin: 15px auto; display: block; }
        .step-1-img { width: 60%; max-width: 200px !important; }
        .step-body p { font-size: 1.25rem; line-height: 1.8; font-weight: 600; color: #333; margin-top: 1.2rem; }
        .step-number { display: inline-block; background: #004e92; color: white; padding: 4px 15px; border-radius: 50px; font-size: 0.9rem; margin-bottom: 10px; font-weight: 800; }

        .back-to-top { position: fixed; bottom: 30px; right: 30px; width: 50px; height: 50px; background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); border-radius: 50%; color: #004e92; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 1000; opacity: 0; visibility: hidden; transition: all 0.4s; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .back-to-top.visible { opacity: 1; visibility: visible; }

        @media (max-width: 768px) { .step-body p { font-size: 1.1rem; } .lang-switcher { top: 10px; right: 10px; } }
    </style>
</head>
<body>
    <canvas id="windCanvas"></canvas>
    <div class="lang-switcher"><select id="langSelect" class="lang-select"><option value="zh">繁體中文</option><option value="en">English</option></select></div>
    <div id="btnBackToTop" class="back-to-top">▲</div>

    <main class="main-container">
        <div class="relative z-20 w-full flex flex-col">
            <nav class="breadcrumb"><a href="../index.html" id="ui-home">🏠 首頁</a> <span class="mx-2 text-gray-400">/</span> <span id="ui-breadcrumb">公會申請教學</span></nav>
            <div class="hero-section text-center"><h1 class="text-4xl font-bold mb-4 text-blue-900" id="ui-title">公會申請教學</h1><p class="text-gray-700 font-medium text-xl opacity-90 mb-8" id="ui-subtitle"></p></div>
            <hr class="my-8 border-t border-black/10">

            <div id="steps-container" class="space-y-12"></div>

            <div class="h-20 w-full"></div>
            <footer class="update-info" id="ui-footer"></footer>
        </div>
    </main>

    <script>
        let currentLang = localStorage.getItem('prefLang') || 'zh';

        function renderPage() {
            const ui = GUILD_APP_DATABASE.ui[currentLang];
            const steps = GUILD_APP_DATABASE.steps;

            document.getElementById('ui-title').innerText = ui.title;
            document.getElementById('ui-subtitle').innerHTML = ui.subtitle;
            document.getElementById('ui-home').innerText = ui.breadcrumb_home;
            document.getElementById('ui-breadcrumb').innerText = ui.breadcrumb_current;
            document.getElementById('ui-footer').innerText = ui.footer;
            document.getElementById('btnBackToTop').innerText = ui.back_to_top;

            const container = document.getElementById('steps-container');
            container.innerHTML = '';

            steps.forEach(step => {
                let content = `
                    <section class="blur-card reveal step-body">
                        <div class="text-left w-full">
                            <span class="step-number">${ui.step} ${step.id}</span>
                            <h2 class="text-2xl font-bold text-blue-900 border-none mt-0 mb-6">${currentLang === 'zh' ? step.title_zh : step.title_en}</h2>
                `;

                if (step.img) {
                    content += `
                        <div class="icon-wrapper">
                            <img src="${step.img}" class="guide-image card-icon ${step.img_class || ''}" style="${step.id === 2 ? 'width: 220px;' : ''}">
                        </div>`;
                }

                content += `<p>${currentLang === 'zh' ? step.desc_zh : step.desc_en}</p>`;

                if (step.guild_list) {
                    content += `<div class="mt-4 space-y-2">`;
                    step.guild_list.forEach(g => {
                        content += `<p class="my-1 font-bold text-blue-800">${g.name} － <strong>${g.id}</strong></p>`;
                    });
                    content += `</div>`;
                    content += `<p>${currentLang === 'zh' ? step.desc_footer_zh : step.desc_footer_en}</p>`;
                }

                if (step.id === 3) {
                    content += `
                        <div class="text-center w-full mt-8 mb-4">
                            <a href="https://discord.gg/UKgG3CxsZD" target="_blank" class="bg-emerald-600 hover:bg-emerald-700 text-white px-10 py-5 rounded-2xl text-center font-black shadow-xl hover:scale-105 transition-all text-2xl inline-block">
                                ${ui.btn_discord}
                            </a>
                        </div>
                        <div class="note text-left mt-12">
                            <strong>${ui.note_title}</strong><br>${ui.note_content}
                        </div>`;
                }

                content += `</div></section>`;
                container.innerHTML += content;
            });

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('active'); });
            }, { threshold: 0.1 });
            document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
        }

        document.getElementById('langSelect').addEventListener('change', (e) => {
            currentLang = e.target.value;
            localStorage.setItem('prefLang', currentLang);
            renderPage();
        });

        const btt = document.getElementById('btnBackToTop');
        window.addEventListener('scroll', () => { if (window.pageYOffset > 400) btt.classList.add('visible'); else btt.classList.remove('visible'); });
        btt.addEventListener('click', () => { window.scrollTo({ top: 0, behavior: 'smooth' }); });

        document.getElementById('langSelect').value = currentLang;
        renderPage();
    </script>
    <script>
        const canvas = document.getElementById('windCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function initCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        class Wind {
            constructor() { this.reset(); }
            reset() { this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height; this.length = Math.random() * 80 + 40; this.thickness = Math.random() * 1.2 + 0.5; this.speed = Math.random() * 0.8 + 0.4; this.opacity = Math.random() * 0.3 + 0.15; }
            update() { this.x += this.speed; this.y += Math.sin(this.x / 150) * 0.3; if (this.x - this.length > canvas.width) { this.x = -this.length; this.y = Math.random() * canvas.height; } }
            draw() { ctx.beginPath(); const grad = ctx.createLinearGradient(this.x - this.length, this.y, this.x, this.y); grad.addColorStop(0, 'rgba(255, 255, 255, 0)'); grad.addColorStop(1, `rgba(255, 255, 255, ${this.opacity})`); ctx.strokeStyle = grad; ctx.lineWidth = this.thickness; ctx.lineCap = 'round'; ctx.moveTo(this.x - this.length, this.y); ctx.lineTo(this.x, this.y); ctx.stroke(); }
        }
        function animate() { ctx.clearRect(0, 0, canvas.width, canvas.height); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animate); }
        window.addEventListener('resize', () => { initCanvas(); particles=[]; for(let i=0; i<35; i++) particles.push(new Wind()); });
        initCanvas(); for(let i=0; i<35; i++) particles.push(new Wind()); animate();
    </script>
</body>
</html>
