<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>War Inc Rising - Game Modes</title>
    <!-- 使用 Tailwind CSS 處理佈局 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../assets/css/style.css">
    <script src="modes_data.js"></script>
    <style>
        /* 🚀 語言切換選單樣式 */
        .lang-switcher { position: fixed; top: 20px; right: 20px; z-index: 2000; }
        .lang-select { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px); border: 2px solid #004e92; color: #004e92; padding: 8px 15px; border-radius: 50px; font-weight: 800; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }

        .breadcrumb { font-weight: 600; color: #004e92; margin-bottom: 2rem; font-size: 1.1rem; }
        .breadcrumb a { text-decoration: none; color: #444; }

        .mode-body h3 { font-size: 1.5rem; color: #004e92; font-weight: 800; margin-top: 2rem; margin-bottom: 1rem; border-bottom: 2px solid rgba(0,78,146,0.1); padding-bottom: 5px; }
        .mode-body p { margin-bottom: 1.2rem; line-height: 1.8; color: #333; font-weight: 500; }
        
        .stats-table-container { width: 100%; margin: 2rem 0; }
        .stats-table table {
            width: 100%; border-collapse: separate; border-spacing: 0;
            border-radius: 1.25rem; overflow: hidden; border: 1px solid rgba(0, 78, 146, 0.1);
            background-color: rgba(255, 255, 255, 0.2); table-layout: fixed;
        }
        .stats-table th { 
            background-color: rgba(100, 116, 139, 0.1) !important; color: #004e92 !important; 
            width: 160px; text-align: center; padding: 15px; font-weight: 800;
            border-right: 1px solid rgba(0, 78, 146, 0.1); border-bottom: 1px solid rgba(0, 78, 146, 0.05);
        }
        .stats-table td { width: auto; text-align: left; padding: 15px 25px; font-weight: 600; color: #444; border-bottom: 1px solid rgba(0, 78, 146, 0.05); line-height: 1.6; }

        .back-to-top { position: fixed; bottom: 30px; right: 30px; width: 50px; height: 50px; background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); border-radius: 50%; color: #004e92; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 1000; opacity: 0; visibility: hidden; transition: all 0.4s; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .back-to-top.visible { opacity: 1; visibility: visible; }

        @media (max-width: 768px) {
            .stats-table th { width: 110px; padding: 12px 10px; font-size: 0.9rem; }
            .stats-table td { padding: 12px 15px; font-size: 0.9rem; }
            .mode-body h3 { font-size: 1.3rem; }
            .back-to-top { bottom: 20px; right: 20px; width: 45px; height: 45px; }
            .lang-switcher { top: 10px; right: 10px; }
        }
    </style>
</head>
<body>
    <canvas id="windCanvas"></canvas>

    <!-- 🚀 語言切換選單：繁體、簡體、英語 -->
    <div class="lang-switcher">
        <select id="langSelect" class="lang-select">
            <option value="zh">繁體中文</option>
            <option value="cn">简体中文</option>
            <option value="en">English</option>
        </select>
    </div>

    <div id="btnBackToTop" class="back-to-top">▲</div>

    <main class="main-container">
        <div class="relative z-20 w-full flex flex-col mode-body">
            
            <nav class="breadcrumb"><a href="../index.html" id="ui-home">🏠 首頁</a> <span class="mx-2 text-gray-400">/</span> <span id="ui-breadcrumb"></span></nav>
            <div class="hero-section text-center"><h1 class="text-4xl font-bold mb-4 text-blue-900" id="ui-title"></h1><p class="text-gray-700 font-medium opacity-80 mb-8" id="ui-subtitle"></p></div>
            <hr class="my-8 border-t border-black/10">

            <div id="mode-display-area" class="space-y-12"></div>

            <div class="h-20 w-full"></div>
            <!-- 🚀 頁尾已修正對接 -->
            <footer class="update-info" id="ui-footer"></footer>
        </div>
    </main>

    <script>
        let currentLang = localStorage.getItem('prefLang') || 'zh';

        function renderPage() {
            const ui = MODE_DATABASE.ui[currentLang];
            const modes = MODE_DATABASE.modes;

            if (!ui) return;

            // UI 靜態文字更新
            document.getElementById('ui-title').innerText = ui.title;
            document.getElementById('ui-subtitle').innerText = ui.subtitle;
            document.getElementById('ui-home').innerText = ui.breadcrumb_home;
            document.getElementById('ui-breadcrumb').innerText = ui.breadcrumb_current;
            document.getElementById('ui-footer').innerText = ui.update_info;
            document.getElementById('btnBackToTop').innerText = ui.back_to_top;

            const area = document.getElementById('mode-display-area');
            area.innerHTML = '';

            modes.forEach(mode => {
                let statsHtml = '';
                mode.stats.forEach(stat => {
                    let fName = currentLang === 'zh' ? stat.f_zh : (currentLang === 'cn' ? stat.f_cn : stat.f_en);
                    let dName = currentLang === 'zh' ? stat.d_zh : (currentLang === 'cn' ? stat.d_cn : stat.d_en);
                    statsHtml += `<tr><th>${fName}</th><td>${dName}</td></tr>`;
                });

                area.innerHTML += `
                    <section class="blur-card reveal">
                        <div class="text-content text-left w-full">
                            <h2 class="text-2xl font-bold text-blue-900 border-none mt-0">
                                ${currentLang === 'zh' ? mode.name_zh : (currentLang === 'cn' ? mode.name_cn : mode.name_en)}
                            </h2>
                            <p class="mt-4">
                                ${currentLang === 'zh' ? mode.intro_zh : (currentLang === 'cn' ? mode.intro_cn : mode.intro_en)}
                            </p>
                            <div class="stats-table-container">
                                <div class="stats-table">
                                    <table>
                                        <thead><tr><th>${ui.table_feature}</th><th>${ui.table_desc}</th></tr></thead>
                                        <tbody>${statsHtml}</tbody>
                                    </table>
                                </div>
                            </div>
                            ${mode.mechanics_zh ? `
                                <h3>${currentLang === 'zh' ? mode.mechanics_title_zh : (currentLang === 'cn' ? mode.mechanics_title_cn : mode.mechanics_title_en)}</h3>
                                <p>${currentLang === 'zh' ? mode.mechanics_zh : (currentLang === 'cn' ? mode.mechanics_cn : mode.mechanics_en)}</p>
                            ` : ''}
                            ${mode.season_zh ? `
                                <h3>${currentLang === 'zh' ? mode.season_title_zh : (currentLang === 'cn' ? mode.season_title_cn : mode.season_title_en)}</h3>
                                <p>${currentLang === 'zh' ? mode.season_zh : (currentLang === 'cn' ? mode.season_cn : mode.season_en)}</p>
                            ` : ''}
                            ${mode.note_zh ? `
                                <div class="note">${currentLang === 'zh' ? mode.note_zh : (currentLang === 'cn' ? mode.note_cn : mode.note_en)}</div>
                            ` : ''}
                        </div>
                    </section>
                `;
            });

            // 動畫偵測
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('active'); });
            }, { threshold: 0.1 });
            document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
        }

        document.getElementById('langSelect').addEventListener('change', (e) => {
            currentLang = e.target.value;
            localStorage.setItem('prefLang', currentLang);
            renderPage();
        });

        const btt = document.getElementById('btnBackToTop');
        window.addEventListener('scroll', () => { if (window.pageYOffset > 400) btt.classList.add('visible'); else btt.classList.remove('visible'); });
        btt.addEventListener('click', () => { window.scrollTo({ top: 0, behavior: 'smooth' }); });

        document.getElementById('langSelect').value = currentLang;
        renderPage();
    </script>
    <script>
        // 粒子特效
        const canvas = document.getElementById('windCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function initCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        class Wind {
            constructor() { this.reset(); }
            reset() { this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height; this.length = Math.random() * 80 + 40; this.thickness = Math.random() * 1.2 + 0.5; this.speed = Math.random() * 0.8 + 0.4; this.opacity = Math.random() * 0.25 + 0.1; }
            update() { this.x += this.speed; this.y += Math.sin(this.x / 150) * 0.3; if (this.x - this.length > canvas.width) { this.x = -this.length; this.y = Math.random() * canvas.height; } }
            draw() { ctx.beginPath(); const grad = ctx.createLinearGradient(this.x - this.length, this.y, this.x, this.y); grad.addColorStop(0, 'rgba(255, 255, 255, 0)'); grad.addColorStop(1, `rgba(255, 255, 255, ${this.opacity})`); ctx.strokeStyle = grad; ctx.lineWidth = this.thickness; ctx.lineCap = 'round'; ctx.moveTo(this.x - this.length, this.y); ctx.lineTo(this.x, this.y); ctx.stroke(); }
        }
        function animate() { ctx.clearRect(0, 0, canvas.width, canvas.height); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animate); }
        window.addEventListener('resize', () => { initCanvas(); particles=[]; for(let i=0; i<35; i++) particles.push(new Wind()); });
        initCanvas(); for(let i=0; i<35; i++) particles.push(new Wind()); animate();
    </script>
</body>
</html>
