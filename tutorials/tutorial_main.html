<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>War Inc Rising - Advanced Guide</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../assets/css/style.css">
    <script src="tutorial_data.js"></script>
    <style>
        .lang-switcher { position: fixed; top: 20px; right: 20px; z-index: 2000; }
        .lang-select { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px); border: 2px solid #004e92; color: #004e92; padding: 8px 15px; border-radius: 50px; font-weight: 800; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .breadcrumb { font-weight: 600; color: #004e92; margin-bottom: 2rem; font-size: 1.1rem; }
        .breadcrumb a { text-decoration: none; color: #444; }

        .guide-body h2 { font-size: 1.8rem !important; color: #004e92; font-weight: 900; border-bottom: 3px solid rgba(0, 78, 146, 0.1); padding-bottom: 0.5rem; margin-bottom: 1.5rem; }
        .guide-body h3 { font-size: 1.6rem !important; color: #004e92; font-weight: 800; margin-top: 2.5rem; margin-bottom: 1.2rem; }
        .guide-body h4 { font-size: 1.25rem !important; color: #1e3a8a; font-weight: 800; margin-top: 1.5rem; margin-bottom: 1rem; display: flex; align-items: center; }
        .guide-body p, .guide-body li, .mode-list-item { line-height: 2.0; margin-bottom: 1.2rem; color: #333; font-size: 1.15rem !important; font-weight: 400; }
        
        .stats-table table { width: 100%; border-collapse: collapse; font-size: 1.1rem; }
        .stats-table th, .stats-table td { text-align: center; padding: 16px 12px; border: 1px solid rgba(0, 78, 146, 0.1); line-height: 1.8; }
        .stats-table th { background-color: rgba(0, 78, 146, 0.05) !important; color: #004e92 !important; font-weight: 800; }
        
        /* 🚀 競技場推薦名單：強制靠左與標籤樣式 */
        .recommend-left { text-align: left !important; padding-left: 30px !important; padding-top: 10px; padding-bottom: 10px; }
        .tier-label { color: #004e92 !important; font-weight: 900 !important; display: inline-block; margin-right: 5px; margin-top: 6px; }
        
        .income-table th:nth-child(2), .income-table td:nth-child(2) { width: 120px !important; white-space: nowrap !important; }

        .back-to-top { position: fixed; bottom: 30px; right: 30px; width: 50px; height: 50px; background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); border-radius: 50%; color: #004e92; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 1000; opacity: 0; visibility: hidden; transition: all 0.4s; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .back-to-top.visible { opacity: 1; visibility: visible; }

        @media (max-width: 768px) { .main-container { padding: 1.5rem 1rem; } .stats-table table { font-size: 1rem; } .lang-switcher { top: 10px; right: 10px; } .recommend-left { padding-left: 15px !important; } .income-table th:nth-child(2), .income-table td:nth-child(2) { width: 80px !important; } }
    </style>
</head>
<body>
    <canvas id="windCanvas"></canvas>
    <div class="lang-switcher">
        <select id="langSelect" class="lang-select">
            <option value="zh">繁體中文</option>
            <option value="cn">简体中文</option>
            <option value="en">English</option>
        </select>
    </div>
    <div id="btnBackToTop" class="back-to-top">▲</div>

    <main class="main-container">
        <div class="relative z-20 w-full flex flex-col guide-body">
            
            <nav class="breadcrumb"><a href="../index.html" id="ui-home">🏠 首頁</a> <span class="mx-2 text-gray-400">/</span> <span id="ui-breadcrumb"></span></nav>
            <div class="hero-section text-center"><h1 class="text-4xl font-bold mb-4 text-blue-900" id="ui-title"></h1><p class="text-gray-700 font-medium opacity-80 mb-8" id="ui-subtitle"></p></div>
            <hr class="my-8 border-t border-black/10">

            <div id="tutorial-display-area" class="space-y-12">
                <!-- 由 JavaScript 填充 -->
            </div>

            <div class="h-20 w-full"></div>
            <footer class="update-info text-right font-bold opacity-80" id="ui-footer"></footer>
        </div>
    </main>

    <script>
        let currentLang = localStorage.getItem('prefLang') || 'zh';

        function renderPage() {
            // 安全防護
            if (typeof TUTORIAL_DATABASE === 'undefined') {
                console.error("無法載入資料庫。");
                return;
            }

            const ui = TUTORIAL_DATABASE.ui[currentLang] || TUTORIAL_DATABASE.ui['zh'];
            const data = TUTORIAL_DATABASE.content;

            document.getElementById('ui-title').innerText = ui.title;
            document.getElementById('ui-subtitle').innerText = ui.subtitle;
            document.getElementById('ui-home').innerText = ui.breadcrumb_home;
            document.getElementById('ui-breadcrumb').innerText = ui.breadcrumb_current;
            document.getElementById('ui-footer').innerText = ui.footer;
            document.getElementById('btnBackToTop').innerText = ui.back_to_top;

            const area = document.getElementById('tutorial-display-area');
            area.innerHTML = '';

            // --- 區塊 1: 機制 ---
            area.innerHTML += `
                <section class="blur-card reveal">
                    <div class="text-content text-left w-full">
                        <h2>${data.payment['title_' + currentLang] || data.payment.title_zh}</h2>
                        <p>${data.payment['p1_' + currentLang] || data.payment.p1_zh}</p>
                        <p>${data.payment['p2_' + currentLang] || data.payment.p2_zh}</p>
                        <p>${data.payment['p3_' + currentLang] || data.payment.p3_zh}</p>
                        <p>${data.payment['p4_' + currentLang] || data.payment.p4_zh}</p>
                    </div>
                </section>`;

            // --- 區塊 2: 招募策略 ---
            let mythHtml = "";
            let mythTypes = data.recruitment['mythic_types_' + currentLang] || data.recruitment.mythic_types_zh;
            mythTypes.forEach(item => mythHtml += `<li>${item}</li>`);
            
            let arenaRows = "";
            let arenaData = data.recruitment['arena_table_' + currentLang] || data.recruitment.arena_table_zh;
            arenaData.forEach(row => {
                arenaRows += `<tr><td class="font-black w-1/4">${row[0]}</td><td class="recommend-left text-base">${row[1]}</td></tr>`;
            });

            area.innerHTML += `
                <section class="blur-card reveal">
                    <div class="text-content text-left w-full">
                        <h2>${data.recruitment['title_' + currentLang] || data.recruitment.title_zh}</h2>
                        <p>${data.recruitment['p1_' + currentLang] || data.recruitment.p1_zh}</p>
                        
                        <h3 class="mb-4">${data.recruitment['h1_' + currentLang] || data.recruitment.h1_zh}</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 text-center mb-10">
                            <div class="p-6 bg-white/20 rounded-2xl border border-white/30">
                                <h4 class="justify-center border-b border-blue-200 pb-2 mb-4">PVE</h4>
                                <ul class="list-none pl-0">${data.recruitment['pve_list_' + currentLang] || data.recruitment.pve_list_zh}</ul>
                            </div>
                            <div class="p-6 bg-white/20 rounded-2xl border border-white/30">
                                <h4 class="justify-center border-b border-blue-200 pb-2 mb-4">PVP</h4>
                                <ul class="list-none pl-0">${data.recruitment['pvp_list_' + currentLang] || data.recruitment.pvp_list_zh}</ul>
                            </div>
                        </div>

                        <h3>${data.recruitment['h2_' + currentLang] || data.recruitment.h2_zh}</h3>
                        <p>${data.recruitment['rarity_' + currentLang] || data.recruitment.rarity_zh}</p>
                        
                        <div class="stats-table overflow-x-auto"><table><thead><tr>
                            ${(data.recruitment['table1_th_' + currentLang] || data.recruitment.table1_th_zh).map(th => `<th>${th}</th>`).join('')}
                        </tr></thead><tbody>
                            ${(data.recruitment['table1_rows_' + currentLang] || data.recruitment.table1_rows_zh).map(row => `<tr>${row.map(td => `<td>${td}</td>`).join('')}</tr>`).join('')}
                        </tbody></table></div>

                        <h3>${data.recruitment['h3_' + currentLang] || data.recruitment.h3_zh}</h3>
                        <ul class="space-y-4 pl-5">${mythHtml}</ul>

                        <h3>${data.recruitment['h4_' + currentLang] || data.recruitment.h4_zh}</h3>
                        <div class="stats-table overflow-x-auto"><table><thead><tr><th>${ui.table_head_type}</th><th class="recommend-left">${ui.table_head_unit}</th></tr></thead><tbody>${arenaRows}</tbody></table></div>
                    </div>
                </section>`;

            // --- 區塊 3: 鍛造石 ---
            let forgeRows = "";
            let forgeData = data.forge['table_' + currentLang] || data.forge.table_zh;
            forgeData.forEach(row => {
                forgeRows += `<tr><td class="font-bold">${row[0]}</td><td>${row[1]}</td><td>${row[2]}</td><td>${row[3]}</td></tr>`;
            });

            area.innerHTML += `
                <section class="blur-card reveal">
                    <div class="text-content text-left w-full">
                        <h2>${data.forge['title_' + currentLang] || data.forge.title_zh}</h2>
                        <p>${data.forge['p1_' + currentLang] || data.forge.p1_zh}</p>
                        <div class="note">${data.forge['note_' + currentLang] || data.forge.note_zh}</div>
                        <h4 class="justify-start mt-6">${data.forge['h1_' + currentLang] || data.forge.h1_zh}</h4>
                        <p>${data.forge['p2_' + currentLang] || data.forge.p2_zh}</p>
                        <h3>${data.forge['table_h_' + currentLang] || data.forge.table_h_zh}</h3>
                        <div class="stats-table overflow-x-auto"><table><thead><tr>
                            ${(data.forge['table_th_' + currentLang] || data.forge.table_th_zh).map(th => `<th>${th}</th>`).join('')}
                        </tr></thead><tbody>${forgeRows}</tbody></table></div>
                    </div>
                </section>`;

            // --- 區塊 4: 課金 ---
            let incomeRows = "";
            let incomeData = data.spending['income_' + currentLang] || data.spending.income_zh;
            incomeData.forEach(row => {
                incomeRows += `<tr><td>${row[0]}</td><td>${row[1]}</td><td>${row[2]}</td></tr>`;
            });
            // 加上合計
            const totalText = data.spending['income_total_' + currentLang] || data.spending.income_total_zh;
            incomeRows += `<tr style="background: rgba(0,78,146,0.05);"><td class="font-bold">Total</td><td colspan="2" class="font-black text-blue-900 text-lg">${totalText}</td></tr>`;
            
            let tierRows = "";
            let tierData = data.spending['tiers_' + currentLang] || data.spending.tiers_zh;
            tierData.forEach(row => {
                tierRows += `<tr><td>${row[0]}</td><td>${row[1]}</td><td>${row[2]}</td></tr>`;
            });
            
            let dirList = "";
            let dirData = data.spending['direction_list_' + currentLang] || data.spending.direction_list_zh;
            dirData.forEach(item => dirList += `<li>${item}</li>`);

            area.innerHTML += `
                <section class="blur-card reveal">
                    <div class="text-content text-left w-full">
                        <h2>${data.spending['title_' + currentLang] || data.spending.title_zh}</h2>
                        <p>${data.spending['p1_' + currentLang] || data.spending.p1_zh}</p>
                        
                        <h3>${data.spending['income_h_' + currentLang] || data.spending.income_h_zh}</h3>
                        <div class="stats-table income-table overflow-x-auto"><table><thead><tr>
                            ${(data.spending['inc_th_' + currentLang] || data.spending.inc_th_zh).map(th => `<th>${th}</th>`).join('')}
                        </tr></thead><tbody>${incomeRows}</tbody></table></div>
                        
                        <h3>${data.spending['direction_h_' + currentLang] || data.spending.direction_h_zh}</h3>
                        <ul class="space-y-4 pl-5 list-disc">${dirList}</ul>
                        
                        <h3>${data.spending['tiers_h_' + currentLang] || data.spending.tiers_h_zh}</h3>
                        <div class="stats-table overflow-x-auto"><table><thead><tr>
                            ${(data.spending['tier_th_' + currentLang] || data.spending.tier_th_zh).map(th => `<th>${th}</th>`).join('')}
                        </tr></thead><tbody>${tierRows}</tbody></table></div>
                        
                        <h3 class="mt-10">${data.spending['strategy_h_' + currentLang] || data.spending.strategy_h_zh}</h3>
                        <div class="space-y-6">
                            <div class="p-6 bg-white/20 rounded-2xl border border-white/30 shadow-sm">
                                <h4 class="justify-center border-b border-blue-200 pb-3 mb-4">${data.spending['s1_t_' + currentLang] || data.spending.s1_t_zh}</h4>
                                <p class="m-0">${data.spending['s1_c_' + currentLang] || data.spending.s1_c_zh}</p>
                            </div>
                            <div class="p-6 bg-white/20 rounded-2xl border border-white/30 shadow-sm">
                                <h4 class="justify-center border-b border-blue-200 pb-3 mb-4">${data.spending['s2_t_' + currentLang] || data.spending.s2_t_zh}</h4>
                                <p class="m-0">${data.spending['s2_c_' + currentLang] || data.spending.s2_c_zh}</p>
                            </div>
                        </div>
                        <div class="note mt-10">${data.spending['final_note_' + currentLang] || data.spending.final_note_zh}</div>
                    </div>
                </section>`;

            refreshObservers();
        }

        document.getElementById('langSelect').addEventListener('change', (e) => { currentLang = e.target.value; localStorage.setItem('prefLang', currentLang); renderPage(); });
        function refreshObservers() { const observer = new IntersectionObserver((entries) => { entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('active'); }); }, { threshold: 0.05 }); document.querySelectorAll('.reveal').forEach(el => observer.observe(el)); }
        const btt = document.getElementById('btnBackToTop');
        window.addEventListener('scroll', () => { if (window.pageYOffset > 400) btt.classList.add('visible'); else btt.classList.remove('visible'); });
        btt.addEventListener('click', () => { window.scrollTo({ top: 0, behavior: 'smooth' }); });
        document.getElementById('langSelect').value = currentLang;
        renderPage();
    </script>
    <script>
        const canvas = document.getElementById('windCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function initCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        class Wind {
            constructor() { this.reset(); }
            reset() { this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height; this.length = Math.random() * 80 + 40; this.thickness = Math.random() * 1.2 + 0.5; this.speed = Math.random() * 0.8 + 0.4; this.opacity = Math.random() * 0.3 + 0.15; }
            update() { this.x += this.speed; this.y += Math.sin(this.x / 150) * 0.3; if (this.x - this.length > canvas.width) { this.x = -this.length; this.y = Math.random() * canvas.height; } }
            draw() { ctx.beginPath(); const grad = ctx.createLinearGradient(this.x - this.length, this.y, this.x, this.y); grad.addColorStop(0, 'rgba(255, 255, 255, 0)'); grad.addColorStop(1, `rgba(255, 255, 255, ${this.opacity})`); ctx.strokeStyle = grad; ctx.lineWidth = this.thickness; ctx.lineCap = 'round'; ctx.moveTo(th
