<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>War Inc Rising - Troops Compendium</title>
    <!-- 使用 Tailwind CSS 處理佈局 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../assets/css/style.css">
    <!-- 載入數據檔案 -->
    <script src="units_data.js"></script>
    <style>
        /* 🚀 語言切換選單 */
        .lang-switcher { position: fixed; top: 20px; right: 20px; z-index: 2000; }
        .lang-select { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px); border: 2px solid #004e92; color: #004e92; padding: 8px 15px; border-radius: 50px; font-weight: 800; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }

        .breadcrumb { font-weight: 600; color: #004e92; margin-bottom: 2rem; font-size: 1.1rem; }
        .breadcrumb a { text-decoration: none; color: #444; }
        
        /* 🚀 修正後的導覽列：強制靠中對齊 */
        .rarity-nav-container { position: sticky; top: 15px; z-index: 100; width: 100%; display: flex; justify-content: center; margin-bottom: 30px; }
        .rarity-nav {
            display: flex; 
            justify-content: center; /* 🚀 關鍵修改：居中對齊標籤 */
            flex-wrap: nowrap; overflow-x: auto; white-space: nowrap;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(15px); padding: 12px 20px; border-radius: 1.25rem;
            border: 1px solid rgba(255, 255, 255, 0.4); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1); gap: 12px;
        }
        .rarity-nav::-webkit-scrollbar { display: none; }
        .rarity-nav a { text-decoration: none; font-weight: 800; font-size: 0.95rem; padding: 8px 15px; border-radius: 10px; flex-shrink: 0; }
        
        .nav-mythic { color: #d4af37; border: 1px solid #d4af37; } .nav-legendary { color: #ff4500; border: 1px solid #ff4500; } 
        .nav-epic { color: #9932cc; border: 1px solid #9932cc; } .nav-rare { color: #1e90ff; border: 1px solid #1e90ff; } 
        .nav-common { color: #3cb371; border: 1px solid #3cb371; }

        /* 內容佈局 */
        .unit-flex { display: flex; gap: 2.5rem; align-items: flex-start; width: 100%; }
        .unit-img-wrapper { flex-shrink: 0; width: 180px; }
        .unit-img { width: 100%; border-radius: 1rem; border: 3px solid rgba(255, 255, 255, 0.6); filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.15)); }
        .rarity-section-title { padding-left: 1rem; margin-top: 5rem; margin-bottom: 2rem; border-left: 6px solid #ccc; }

        /* 回到頂端 */
        .back-to-top { position: fixed; bottom: 30px; right: 30px; width: 50px; height: 50px; background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); border-radius: 50%; color: #004e92; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 1000; opacity: 0; visibility: hidden; transition: all 0.4s; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .back-to-top.visible { opacity: 1; visibility: visible; }

        @media (max-width: 768px) { 
            .unit-flex { flex-direction: column; align-items: center; text-align: center; } 
            .unit-img-wrapper { width: 140px; } 
            .lang-switcher { top: 10px; right: 10px; }
            .rarity-nav { justify-content: flex-start; } /* 手機版維持靠左捲動 */
        }
    </style>
</head>
<body>
    <canvas id="windCanvas"></canvas>

    <div class="lang-switcher">
        <select id="langSelect" class="lang-select">
            <option value="zh">繁體中文</option>
            <option value="en">English</option>
        </select>
    </div>

    <div id="btnBackToTop" class="back-to-top">▲</div>

    <main class="main-container">
        <div class="relative z-20 w-full flex flex-col">
            
            <nav class="breadcrumb">
                <a href="../index.html" id="ui-home">🏠 首頁</a> <span class="mx-2 text-gray-400">/</span> <span id="ui-breadcrumb">士兵介紹</span>
            </nav>

            <div class="hero-section text-center">
                <h1 class="text-4xl font-bold mb-4 text-blue-900" id="ui-title">士兵介紹</h1>
                <p class="text-gray-700 font-medium opacity-80 mb-8" id="ui-subtitle">圖鑑</p>
            </div>
            
            <!-- 🚀 導覽列：置中 -->
            <div class="rarity-nav-container">
                <div class="rarity-nav reveal">
                    <a href="#mythic" class="nav-mythic" id="ui-nav-mythic">🌟神話</a>
                    <a href="#legendary" class="nav-legendary" id="ui-nav-legendary">🔥傳奇</a>
                    <a href="#epic" class="nav-epic" id="ui-nav-epic">🟣史詩</a>
                    <a href="#rare" class="nav-rare" id="ui-nav-rare">💧稀有</a>
                    <a href="#common" class="nav-common" id="ui-nav-common">🟢普通</a>
                </div>
            </div>

            <div id="unit-display-area"></div>

            <div class="h-24 w-full"></div>
            <footer class="update-info" id="ui-footer">© 萌新軍本部 製作</footer>
        </div>
    </main>

    <script>
        let currentLang = localStorage.getItem('prefLang') || 'zh';

        function renderPage() {
            const ui = UNIT_DATABASE.ui[currentLang];
            const units = UNIT_DATABASE.units;

            document.getElementById('ui-title').innerText = ui.title;
            document.getElementById('ui-subtitle').innerText = ui.subtitle;
            document.getElementById('ui-home').innerText = ui.breadcrumb_home;
            document.getElementById('ui-breadcrumb').innerText = ui.breadcrumb_current;
            document.getElementById('ui-nav-mythic').innerText = ui.nav_mythic;
            document.getElementById('ui-nav-legendary').innerText = ui.nav_legendary;
            document.getElementById('ui-nav-epic').innerText = ui.nav_epic;
            document.getElementById('ui-nav-rare').innerText = ui.nav_rare;
            document.getElementById('ui-nav-common').innerText = ui.nav_common;
            document.getElementById('ui-footer').innerText = ui.update_info;
            document.getElementById('btnBackToTop').innerText = ui.back_to_top;

            const container = document.getElementById('unit-display-area');
            container.innerHTML = ''; 

            const rarities = ['mythic', 'legendary', 'epic', 'rare', 'common'];
            rarities.forEach(rar => {
                const filtered = units.filter(u => u.rarity === rar);
                if (filtered.length === 0) return;

                container.innerHTML += `<h2 id="${rar}" class="rarity-section-title text-3xl font-bold">${ui['nav_' + rar]}</h2>`;
                
                let lastGroup = "";
                filtered.forEach(unit => {
                    const groupName = currentLang === 'zh' ? unit.group : unit.group_en;
                    if (groupName && groupName !== lastGroup) {
                        container.innerHTML += `<h3 class="text-xl font-bold text-gray-700 mt-8 mb-4 ml-2">【${groupName}】</h3>`;
                        lastGroup = groupName;
                    }

                    container.innerHTML += `
                        <section class="blur-card reveal mb-8">
                            <div class="unit-flex">
                                <div class="icon-wrapper unit-img-wrapper"><img src="${unit.img}" class="card-icon unit-img"></div>
                                <div class="text-content text-left w-full">
                                    <h3 class="text-2xl font-bold text-blue-900">${currentLang === 'zh' ? unit.name_zh : unit.name_en}</h3>
                                    <p class="text-blue-600 font-bold text-lg mt-1">${ui.position_label}${currentLang === 'zh' ? unit.pos_zh : unit.pos_en}</p>
                                    <div class="mt-4 text-gray-800 font-medium leading-relaxed">${currentLang === 'zh' ? unit.desc_zh : unit.desc_en}</div>
                                </div>
                            </div>
                        </section>`;
                });
            });
            refreshObservers();
        }

        document.getElementById('langSelect').addEventListener('change', (e) => {
            currentLang = e.target.value;
            localStorage.setItem('prefLang', currentLang);
            renderPage();
        });

        function refreshObservers() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('active'); });
            }, { threshold: 0.1 });
            document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
        }

        const btt = document.getElementById('btnBackToTop');
        window.addEventListener('scroll', () => { if (window.pageYOffset > 400) btt.classList.add('visible'); else btt.classList.remove('visible'); });
        btt.addEventListener('click', () => { window.scrollTo({ top: 0, behavior: 'smooth' }); });

        document.getElementById('langSelect').value = currentLang;
        renderPage();
    </script>

    <script>
        const canvas = document.getElementById('windCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function initCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        class Wind {
            constructor() { this.reset(); }
            reset() { this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height; this.length = Math.random() * 80 + 40; this.thickness = Math.random() * 1.2 + 0.5; this.speed = Math.random() * 0.8 + 0.4; this.opacity = Math.random() * 0.3 + 0.15; }
            update() { this.x += this.speed; this.y += Math.sin(this.x / 150) * 0.3; if (this.x - this.length > canvas.width) { this.x = -this.length; this.y = Math.random() * canvas.height; } }
            draw() { ctx.beginPath(); const grad = ctx.createLinearGradient(this.x - this.length, this.y, this.x, this.y); grad.addColorStop(0, 'rgba(255, 255, 255, 0)'); grad.addColorStop(1, `rgba(255, 255, 255, ${this.opacity})`); ctx.strokeStyle = grad; ctx.lineWidth = this.thickness; ctx.lineCap = 'round'; ctx.moveTo(this.x - this.length, this.y); ctx.lineTo(this.x, this.y); ctx.stroke(); }
        }
        function animate() { ctx.clearRect(0, 0, canvas.width, canvas.height); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animate); }
        window.addEventListener('resize', () => { initCanvas(); particles=[]; for(let i=0; i<35; i++) particles.push(new Wind()); });
        initCanvas(); for(let i=0; i<35; i++) particles.push(new Wind()); animate();
    </script>
</body>
</html>
