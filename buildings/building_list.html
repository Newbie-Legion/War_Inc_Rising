<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>War Inc Rising - Buildings Guide</title>
    <!-- 使用 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../assets/css/style.css">
    <script src="building_data.js"></script>
    <style>
        .lang-switcher { position: fixed; top: 20px; right: 20px; z-index: 2000; }
        .lang-select { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px); border: 2px solid #004e92; color: #004e92; padding: 8px 15px; border-radius: 50px; font-weight: 800; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .breadcrumb { font-weight: 600; color: #004e92; margin-bottom: 2rem; font-size: 1.1rem; }
        .breadcrumb a { text-decoration: none; color: #444; }
        .detail-flex { display: flex; gap: 3rem; align-items: center; width: 100%; }
        .building-img-wrapper { flex-shrink: 0; width: 320px; position: relative; }
        .building-display-img { width: 100%; height: auto; border-radius: 1.25rem; border: 4px solid rgba(255, 255, 255, 0.6); filter: drop-shadow(0 15px 30px rgba(0, 0, 0, 0.15)); transition: transform 0.3s ease-out; }
        .back-to-top { position: fixed; bottom: 30px; right: 30px; width: 50px; height: 50px; background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); border-radius: 50%; color: #004e92; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 1000; opacity: 0; visibility: hidden; transition: all 0.4s; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .back-to-top.visible { opacity: 1; visibility: visible; }
        @media (max-width: 768px) { .detail-flex { flex-direction: column; text-align: center; gap: 1.5rem; } .building-img-wrapper { width: 100%; max-width: 280px; } .back-to-top { bottom: 20px; right: 20px; width: 45px; height: 45px; } .lang-switcher { top: 10px; right: 10px; } }
    </style>
</head>
<body>
    <canvas id="windCanvas"></canvas>
    <div class="lang-switcher">
        <select id="langSelect" class="lang-select">
            <option value="zh">繁體中文</option>
            <option value="cn">简体中文</option>
            <option value="en">English</option>
        </select>
    </div>
    <div id="btnBackToTop" class="back-to-top">▲</div>

    <main class="main-container">
        <div class="relative z-20 w-full flex flex-col">
            <nav class="breadcrumb"><a href="../index.html" id="ui-home">🏠 首頁</a> <span class="mx-2 text-gray-400">/</span> <span id="ui-breadcrumb">建築</span></nav>
            <div class="hero-section text-center"><h1 class="text-4xl font-bold mb-4 text-blue-900" id="ui-title">🏗️ 建築</h1><p class="text-gray-700 font-medium opacity-80 mb-8" id="ui-subtitle"></p></div>
            <hr class="my-8 border-t border-black/10">
            <div id="building-display-area" class="space-y-12"></div>
            <div class="h-20 w-full"></div>
            <footer class="update-info" id="ui-footer"></footer>
        </div>
    </main>

    <script>
        let currentLang = localStorage.getItem('prefLang') || 'zh';

        function renderPage() {
            const ui = BUILDING_DATABASE.ui[currentLang];
            const content = BUILDING_DATABASE.content;

            document.getElementById('ui-title').innerText = ui.title;
            document.getElementById('ui-subtitle').innerText = ui.subtitle;
            document.getElementById('ui-home').innerText = ui.breadcrumb_home;
            document.getElementById('ui-breadcrumb').innerText = ui.breadcrumb_current;
            document.getElementById('ui-footer').innerText = ui.footer;
            document.getElementById('btnBackToTop').innerText = ui.back_to_top;

            const area = document.getElementById('building-display-area');
            area.innerHTML = '';

            const mainItems = ['command_post', 'magic_cauldron', 'minion_camp'];
            mainItems.forEach((key, index) => {
                const item = content[key];
                let itemName = currentLang === 'zh' ? item.name_zh : (currentLang === 'cn' ? item.name_cn : item.name_en);
                let itemDesc = currentLang === 'zh' ? item.desc_zh : (currentLang === 'cn' ? item.desc_cn : item.desc_en);

                area.innerHTML += `
                    <section class="blur-card reveal ${index > 0 ? 'delay-1' : ''}">
                        <div class="detail-flex">
                            <div class="icon-wrapper building-img-wrapper"><img src="images/${key}_detail.png" class="card-icon building-display-img"></div>
                            <div class="text-content text-left w-full">
                                <h2 class="text-2xl font-bold text-blue-900 border-none mt-0">${itemName}</h2>
                                <p class="mt-4 font-medium leading-relaxed">${itemDesc}</p>
                            </div>
                        </div>
                    </section>`;
            });

            area.innerHTML += `
                <section class="blur-card reveal">
                    <h2 class="text-2xl font-bold text-blue-900 border-none mt-0 mb-8 text-center">${ui.base_resource_title}</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div class="flex flex-col items-center">
                             <div class="icon-wrapper" style="width: 220px;"><img src="images/lumber_yard_detail.png" class="card-icon building-display-img"></div>
                            <div class="text-content text-center mt-4">
                                <h3 class="text-xl font-bold text-blue-900">${currentLang === 'zh' ? content.lumber_yard.name_zh : (currentLang === 'cn' ? content.lumber_yard.name_cn : content.lumber_yard.name_en)}</h3>
                                <p class="mt-2 text-sm">${currentLang === 'zh' ? content.lumber_yard.desc_zh : (currentLang === 'cn' ? content.lumber_yard.desc_cn : content.lumber_yard.desc_en)}</p>
                            </div>
                        </div>
                        <div class="flex flex-col items-center">
                            <div class="icon-wrapper" style="width: 220px;"><img src="images/gold_mine_detail.png" class="card-icon building-display-img"></div>
                            <div class="text-content text-center mt-4">
                                <h3 class="text-xl font-bold text-blue-900">${currentLang === 'zh' ? content.gold_mine.name_zh : (currentLang === 'cn' ? content.gold_mine.name_cn : content.gold_mine.name_en)}</h3>
                                <p class="mt-2 text-sm">${currentLang === 'zh' ? content.gold_mine.desc_zh : (currentLang === 'cn' ? content.gold_mine.desc_cn : content.gold_mine.desc_en)}</p>
                            </div>
                        </div>
                    </div>
                </section>`;

            area.innerHTML += `
                <section class="blur-card reveal">
                    <h2 class="text-2xl font-bold text-blue-900 border-none mt-0 mb-8 text-center">${ui.new_version_title}</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
                        <div class="flex flex-col items-center">
                            <div class="icon-wrapper" style="max-width: 200px;"><img src="images/wood_collector_detail.jpg" class="card-icon building-display-img"></div>
                            <div class="text-content text-center mt-4"><h3 class="text-lg font-bold text-gray-900">${currentLang === 'zh' ? content.wood_collector.name_zh : (currentLang === 'cn' ? content.wood_collector.name_cn : content.wood_collector.name_en)}</h3></div>
                        </div>
                        <div class="flex flex-col items-center">
                            <div class="icon-wrapper" style="max-width: 200px;"><img src="images/stone_collector_detail.jpg" class="card-icon building-display-img"></div>
                            <div class="text-content text-center mt-4"><h3 class="text-lg font-bold text-gray-900">${currentLang === 'zh' ? content.stone_collector.name_zh : (currentLang === 'cn' ? content.stone_collector.name_cn : content.stone_collector.name_en)}</h3></div>
                        </div>
                    </div>
                    <div class="text-content text-center mt-8"><p class="font-medium">${currentLang === 'zh' ? content.new_version_footer.zh : (currentLang === 'cn' ? content.new_version_footer.cn : content.new_version_footer.en)}</p></div>
                </section>`;

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('active'); });
            }, { threshold: 0.1 });
            document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
        }

        document.getElementById('langSelect').addEventListener('change', (e) => { currentLang = e.target.value; localStorage.setItem('prefLang', currentLang); renderPage(); });
        const btt = document.getElementById('btnBackToTop');
        window.addEventListener('scroll', () => { if (window.pageYOffset > 400) btt.classList.add('visible'); else btt.classList.remove('visible'); });
        btt.addEventListener('click', () => { window.scrollTo({ top: 0, behavior: 'smooth' }); });
        document.getElementById('langSelect').value = currentLang;
        renderPage();
    </script>
    <!-- 粒子腳本省略 -->
    <script>
        const canvas = document.getElementById('windCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function initCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        class Wind {
            constructor() { this.reset(); }
            reset() { this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height; this.length = Math.random() * 80 + 40; this.thickness = Math.random() * 1.2 + 0.5; this.speed = Math.random() * 0.8 + 0.4; this.opacity = Math.random() * 0.3 + 0.15; }
            update() { this.x += this.speed; this.y += Math.sin(this.x / 150) * 0.3; if (this.x - this.length > canvas.width) { this.x = -this.length; this.y = Math.random() * canvas.height; } }
            draw() { ctx.beginPath(); const grad = ctx.createLinearGradient(this.x - this.length, this.y, this.x, this.y); grad.addColorStop(0, 'rgba(255, 255, 255, 0)'); grad.addColorStop(1, `rgba(255, 255, 255, ${this.opacity})`); ctx.strokeStyle = grad; ctx.lineWidth = this.thickness; ctx.lineCap = 'round'; ctx.moveTo(this.x - this.length, this.y); ctx.lineTo(this.x, this.y); ctx.stroke(); }
        }
        function animate() { ctx.clearRect(0, 0, canvas.width, canvas.height); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animate); }
        window.addEventListener('resize', () => { initCanvas(); particles=[]; for(let i=0; i<35; i++) particles.push(new Wind()); });
        initCanvas(); for(let i=0; i<35; i++) particles.push(new Wind()); animate();
    </script>
</body>
</html>
